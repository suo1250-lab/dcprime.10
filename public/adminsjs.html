<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DC Prime — 관리자</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/png" href="/logo.png?v=2" />
</head>
<body class="admin-body" data-role="튜터">

  <!-- 헤더 -->
  <header class="admin-header">
    <div class="admin-header-inner">
      <div class="admin-header-left">
        <img src="/logo.png" alt="대치프라임" style="width:34px;height:34px;border-radius:50%;object-fit:cover" />
        <div>
          <span class="admin-title-text">DC Prime</span>
          <span class="admin-badge" id="adminBadge">튜터</span>
        </div>
      </div>
      <div class="admin-header-right">
        <span class="admin-name" id="adminName">신성호 원장</span>
        <button class="icon-btn" id="logoutBtn" title="로그아웃">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

    <!-- 탭 바 -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="attendance">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        출석 관리
      </button>
      <button class="tab-btn" data-tab="leave">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        지각/결석 관리
      </button>
      <button class="tab-btn" data-tab="study">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2zM22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        학습 현황
      </button>
      <button class="tab-btn" data-tab="analysis">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        상담 관리
      </button>
    </div>
  </header>

  <!-- NAS 백업 상태 바 -->
  <div class="backup-bar" id="backupBar" style="display:none">
    <div class="backup-bar-left">
      <span class="backup-dot" id="backupDot"></span>
      <span class="backup-label" id="backupLabel">백업 상태 확인 중...</span>
    </div>
    <button class="backup-btn" id="backupNowBtn">지금 백업</button>
  </div>

  <!-- ═══════════════ 출석 관리 탭 ═══════════════ -->
  <div class="tab-panel active" id="tabAttendance">
    <div class="admin-panel">

      <!-- 출석 툴바 -->
      <div class="panel-toolbar">
        <div class="toolbar-left">
          <button class="icon-btn-sm" id="weekPrev" title="이전 주">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
          <span class="toolbar-date" id="weekLabel">로딩 중...</span>
          <button class="icon-btn-sm" id="weekNext" title="다음 주">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
          <button class="btn-ghost-sm" id="todayBtn">오늘</button>
          <select class="select-input" id="attCampusFilter" style="margin-left:6px">
            <option value="">전체 캠퍼스</option>
            <option value="능곡">능곡</option>
            <option value="장곡">장곡</option>
          </select>
        </div>
        <div class="toolbar-right">
          <button class="btn-primary-sm" id="exportExcel">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            내보내기
          </button>
        </div>
      </div>

      <!-- 출석 범례 -->
      <div class="attendance-legend">
        <span class="legend-item"><b style="color:#10b981">○</b> 출석완료 (시간표+목표 100%)</span>
        <span class="legend-item"><b style="color:#f59e0b">△</b> 부분 (시간표 제출만)</span>
        <span class="legend-item"><b style="color:#e2574c">✕</b> 미출석</span>
        <span class="legend-item"><b style="color:#8b5cf6">Ⓧ</b> 인정결석</span>
        <span class="legend-hint">셀을 탭하여 수동 보정</span>
      </div>

      <!-- 출석 테이블 -->
      <div class="attendance-table-wrap">
        <table class="attendance-table" id="attendanceTable">
          <thead id="attendanceHead"></thead>
          <tbody id="attendanceBody"></tbody>
        </table>
      </div>

      <p class="panel-note" id="importMsg"></p>
    </div>
  </div>

  <!-- ═══════════════ 학습 현황 탭 ═══════════════ -->
  <!-- ═══════════════ 지각/결석 관리 탭 ═══════════════ -->
  <div class="tab-panel" id="tabLeaveMgmt">
    <div class="admin-panel">
      <div class="panel-toolbar">
        <h2 class="section-subtitle" style="margin:0">지각/결석 신청 내역</h2>
        <input class="select-input" id="lvMgmtSearch" placeholder="학생 이름 검색" style="max-width:200px" />
        <select class="select-input" id="lvMgmtCampus" style="max-width:150px">
          <option value="">전체 캠퍼스</option>
          <option value="능곡">능곡</option>
          <option value="장곡">장곡</option>
        </select>
      </div>
      <div id="lvMgmtList"><p class="empty-text">불러오는 중...</p></div>
    </div>
  </div>

  <div class="tab-panel" id="tabStudy">
    <div class="admin-panel">

      <div class="panel-toolbar">
        <div class="toolbar-left">
          <select class="select-input" id="studyCampusFilter">
            <option value="">전체 캠퍼스</option>
            <option value="능곡">능곡</option>
            <option value="장곡">장곡</option>
          </select>
        </div>
        <div class="toolbar-right">
          <button class="btn-primary-sm" id="refreshStudyBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            새로고침
          </button>
        </div>
      </div>

      <!-- 전체 이행률 요약 -->
      <div id="goalSummaryBar" style="background:#fff;border:1px solid #eceef4;border-radius:14px;padding:14px 18px;margin-bottom:14px;display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-size:13px;font-weight:700;color:#444">전체 목표 이행률</span>
          <span style="font-size:20px;font-weight:800;color:#3b82f6" id="goalSummaryRate">—</span>
        </div>
        <div style="height:8px;background:#eef0f5;border-radius:999px;overflow:hidden">
          <div id="goalSummaryBarFill" style="height:100%;width:0;background:#3b82f6;border-radius:999px;transition:width .3s"></div>
        </div>
        <div style="margin-top:6px;font-size:12px;color:#9098a8" id="goalSummaryDetail"></div>
      </div>

      <!-- 학생별 요약 카드 -->
      <div class="student-summary-cards" id="studySummaryCards"></div>

      <!-- 상세 로그 -->
      <h3 class="section-subtitle">전체 학습 기록</h3>
      <div class="study-log-list" id="studyLogList">
        <p class="empty-text">학습 인증 기록이 없습니다.</p>
      </div>
    </div>
  </div>

  <!-- ═══════════════ 상담 관리 탭 ═══════════════ -->
  <div class="tab-panel" id="tabAnalysis">
    <div class="admin-panel">

      <div class="analysis-header">
        <h2 class="analysis-page-title">학생 상담 기록</h2>
        <p class="analysis-page-desc">학생을 선택해 상담 내역을 추가하고 누적 기록을 관리합니다.</p>
      </div>

      <!-- 학생 선택 카드 -->
      <div class="student-select-grid" id="studentSelectGrid">
        <p class="empty-text">학생 데이터를 불러오는 중...</p>
      </div>

      <!-- 상담 패널 -->
      <div class="analysis-result-panel" id="consultPanel" style="display:none">
        <div class="analysis-result-header">
          <h3 class="analysis-student-name" id="consultStudentName">—</h3>
          <div style="display:flex;gap:8px">
            <button class="btn-ghost-sm" id="reportBtn" style="display:none">리포트 발행</button>
            <button class="btn-primary-sm" id="addConsultBtn">+ 상담내역 추가</button>
          </div>
        </div>

        <!-- 추가 폼 (토글) -->
        <div id="consultForm" style="display:none; margin:14px 0; padding:16px; border:1px solid #eceef4; border-radius:12px;">
          <div class="form-group"><label class="form-label">상담 날짜</label><input class="form-input" id="cDate" type="date" /></div>
          <div class="form-group"><label class="form-label">상담 내용</label><textarea class="form-textarea" id="cContent" rows="3" placeholder="상담 내용"></textarea></div>
          <div class="form-group"><label class="form-label">강점</label><textarea class="form-textarea" id="cStrength" rows="2" placeholder="강점"></textarea></div>
          <div class="form-group"><label class="form-label">약점</label><textarea class="form-textarea" id="cWeakness" rows="2" placeholder="약점"></textarea></div>
          <div class="form-group"><label class="form-label">다음 목표</label><textarea class="form-textarea" id="cNextGoal" rows="2" placeholder="다음 목표"></textarea></div>
          <div class="form-group"><label class="form-label">상담인</label><input class="form-input" id="cCounselor" type="text" placeholder="상담 진행자" /></div>
          <p class="form-error" id="consultFormError"></p>
          <div class="modal-actions">
            <button class="modal-btn modal-btn--cancel" id="consultCancel">취소</button>
            <button class="modal-btn modal-btn--save" id="consultSave">저장</button>
          </div>
        </div>

        <div class="analysis-content" id="consultList"></div>
      </div>
    </div>
  </div>

  <!-- 상담 리포트 모달 -->
  <div class="modal-overlay" id="reportModal">
    <div class="modal modal--form" style="max-height:85vh;display:flex;flex-direction:column">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 class="modal-title" style="margin:0" id="reportModalTitle">상담 리포트</h3>
        <button id="reportModalClose" style="border:none;background:none;font-size:20px;color:#9098a8;cursor:pointer">✕</button>
      </div>
      <div id="reportMajorWrap" style="margin-bottom:12px">
        <label style="font-size:13px;font-weight:600;color:#444;display:block;margin-bottom:6px">계열 선택</label>
        <select id="reportMajorSelect" style="width:100%;padding:10px 12px;border:1px solid #e2e5ee;border-radius:10px;font-size:14px;color:#333;background:#fff">
          <option value="컴퓨터/AI/소프트웨어">컴퓨터/AI/소프트웨어</option>
          <option value="기계/로봇/자동차">기계/로봇/자동차</option>
          <option value="전기/전자/반도체">전기/전자/반도체</option>
          <option value="화학/재료/에너지">화학/재료/에너지</option>
          <option value="건축/토목/환경">건축/토목/환경</option>
          <option value="의학/치의학">의학/치의학</option>
          <option value="간호/보건">간호/보건</option>
          <option value="약학/생명과학">약학/생명과학</option>
          <option value="경영/경제">경영/경제</option>
          <option value="법학/행정">법학/행정</option>
          <option value="교육">교육</option>
          <option value="사회/심리">사회/심리</option>
          <option value="어문/인문">어문/인문</option>
          <option value="자유전공">자유전공</option>
        </select>
        <button id="reportGenerateBtn" class="btn-primary-sm" style="margin-top:10px;width:100%;height:44px;font-size:15px;border-radius:10px">리포트 생성</button>
      </div>
      <div id="reportCacheNotice" style="display:none;font-size:12px;color:#9098a8;margin-bottom:6px;text-align:right"></div>
      <div id="reportContent" style="overflow-y:auto;flex:1;white-space:pre-wrap;font-size:14px;line-height:1.9;color:#333;background:#f8f9fc;border-radius:10px;padding:14px;display:none"></div>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button id="reportRegenBtn" style="display:none;flex:0 0 auto;padding:0 16px;height:44px;font-size:14px;border-radius:10px;border:1px solid #e2e5ee;background:#fff;color:#555;cursor:pointer">재발행</button>
        <button id="reportCopyBtn" class="btn-primary-sm" style="display:none;flex:1;height:44px;font-size:15px;border-radius:10px">복사하기</button>
      </div>
    </div>
  </div>

  <!-- 시간표 보기 모달 -->
  <div class="modal-overlay" id="ttModal">
    <div class="modal modal--form" style="max-height:85vh;display:flex;flex-direction:column;padding-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3 class="modal-title" id="ttModalTitle" style="margin:0">시간표</h3>
        <button id="ttModalClose" style="border:none;background:none;font-size:20px;color:#9098a8;cursor:pointer;padding:0 4px">✕</button>
      </div>
      <div id="ttModalContent" style="overflow-y:auto;flex:1"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="/js/sb.js"></script>
  <script src="/js/admin.js"></script>
</body>
</html>
